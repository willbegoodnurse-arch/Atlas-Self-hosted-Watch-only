name: watch-wallet

services:
  watch-wallet-web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
        INTERNAL_API_URL: ${INTERNAL_API_URL:-http://127.0.0.1:3011}
    container_name: watch-wallet-web
    network_mode: "host"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-/api}
      - INTERNAL_API_URL=${INTERNAL_API_URL:-http://127.0.0.1:3011}
      - PORT=${WEB_PORT:-3010}
      - HOSTNAME=127.0.0.1
    depends_on:
      - watch-wallet-api
    restart: unless-stopped

  watch-wallet-api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: watch-wallet-api
    network_mode: "host"
    env_file:
      - .env
    environment:
      - DATA_DIR=/app/apps/api/data
      - API_HOST=127.0.0.1
      - HOST=127.0.0.1
    volumes:
      - ./apps/api/data:/app/apps/api/data
    restart: unless-stopped
