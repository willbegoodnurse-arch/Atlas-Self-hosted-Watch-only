name: watch-wallet

services:
  watch-wallet-web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
        INTERNAL_API_URL: ${INTERNAL_API_URL:-http://watch-wallet-api:3011}
    container_name: watch-wallet-web
    ports:
      - "${WEB_PORT:-3010}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-/api}
      - INTERNAL_API_URL=${INTERNAL_API_URL:-http://watch-wallet-api:3011}
    depends_on:
      - watch-wallet-api
    restart: unless-stopped

  watch-wallet-api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: watch-wallet-api
    # API port 3011 is Docker-internal only. Do NOT publish to host.
    # The web container accesses this via http://watch-wallet-api:3011
    # Caddy/browser should NOT access 3011 directly.
    expose:
      - "3011"
    env_file:
      - .env
    environment:
      - DATA_DIR=/app/apps/api/data
      - API_HOST=0.0.0.0
      - HOST=0.0.0.0
    volumes:
      - ./apps/api/data:/app/apps/api/data
    restart: unless-stopped
