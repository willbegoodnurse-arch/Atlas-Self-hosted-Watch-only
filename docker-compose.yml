name: watch-wallet

services:
  watch-wallet-web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
        INTERNAL_API_URL: ${INTERNAL_API_URL:-http://watch-wallet-api:3011}
    container_name: watch-wallet-web
    ports:
      - "${WEB_PORT:-3010}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-/api}
      - INTERNAL_API_URL=${INTERNAL_API_URL:-http://watch-wallet-api:3011}
    depends_on:
      - watch-wallet-api
    restart: unless-stopped

  watch-wallet-api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: watch-wallet-api
    ports:
      - "${API_PORT:-3011}:${API_PORT:-3011}"
    env_file:
      - .env
    environment:
      - DATA_DIR=/app/apps/api/data
    volumes:
      - ./apps/api/data:/app/apps/api/data
    restart: unless-stopped
